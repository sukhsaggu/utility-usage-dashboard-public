name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    # Run composite JS actions (e.g. actions/cache via setup-node) on Node 24 — see
    # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # App + Docker image use Node 20; keep CI aligned unless you bump the Dockerfile.
          node-version: "20"
          cache: "npm"

      - name: Install and audit
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (for scan)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: utility-usage-dashboard:ci

      - name: Run Trivy (critical + high)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: utility-usage-dashboard:ci
          format: table
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          scanners: "vuln"
